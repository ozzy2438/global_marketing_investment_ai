# JARVIS AI Agency OS — Docker Compose
# =====================================
version: '3.8'

services:
  # ---- Backend API ----
  jarvis-api:
    build: .
    container_name: jarvis-api
    ports:
      - "${PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - JARVIS_ENV=production
    volumes:
      # Persist the SQLite database outside the container
      - ./jarvis.db:/app/jarvis.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---- Frontend Dashboard (Nginx) ----
  jarvis-dashboard:
    image: nginx:alpine
    container_name: jarvis-dashboard
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      jarvis-api:
        condition: service_healthy
    restart: unless-stopped
